---
.common:
  distro_build_pkgset: &distro_build_pkgset
    include:
      - "dnf"
      - "dosfstools"
      - "e2fsprogs"
      - "glibc"
      - "lvm2"
      - "policycoreutils"
      - "python3-iniparse"
      - "qemu-img"
      - "selinux-policy-targeted"
      - "systemd"
      - "tar"
      - "xfsprogs"
      - "xz"
    conditions:
      "x86_64 specific packages for build pkgsset":
        when:
          arch: "x86_64"
        append:
          include:
            - "grub2-pc"
      "ppc64le specific packages for build pkgsset":
        when:
          arch: "ppc64le"
        append:
          include:
            - "grub2-ppc64le"
            - "grub2-ppc64le-modules"

  disk_sizes:
    default_required_partition_sizes: &default_required_dir_sizes
      "/": "1 GiB"
      "/usr": "2 GiB"

  platforms:
    x86_64_uefi_platform: &x86_64_uefi_platform
      arch: "x86_64"
      bootloader: "grub2"
      uefi_vendor: "{{.DistroVendor}}"
      qcow2_compat: "1.1"
      packages: &x86_64_uefi_platform_packages
        uefi:
          - "dracut-config-generic"
          - "efibootmgr"
          - "grub2-efi-x64"
          - "shim-x64"
    x86_64_bios_platform: &x86_64_bios_platform
      <<: *x86_64_uefi_platform
      bios_platform: "i386-pc"
      uefi_vendor: "{{.DistroVendor}}"
      packages: &x86_64_bios_platform_packages
        <<: *x86_64_uefi_platform_packages
        bios:
          - "dracut-config-generic"
          - "grub2-pc"
      build_packages:
        bios:
          - "grub2-pc"
    x86_64_bios_only_platform: &x86_64_bios_only_platform
      arch: "x86_64"
      bios_platform: "i386-pc"
      bootloader: "grub2"
      image_format: "raw"
      packages:
        bios:
          - "grub2-pc"
      build_packages:
        bios:
          - "grub2-pc"
    x86_64_edge_platform: &x86_64_edge_platform
      <<: *x86_64_bios_platform
      packages:
        <<: *x86_64_bios_platform_packages
        firmware:
          - "microcode_ctl"  # ??
          - "iwl1000-firmware"
          - "iwl100-firmware"
          - "iwl105-firmware"
          - "iwl135-firmware"
          - "iwl2000-firmware"
          - "iwl2030-firmware"
          - "iwl3160-firmware"
          - "iwl5000-firmware"
          - "iwl5150-firmware"
          - "iwl6050-firmware"
    x86_64_installer_platform: &x86_64_installer_platform
      <<: *x86_64_bios_platform
      image_format: "raw"
      packages:
        <<: *x86_64_bios_platform_packages
        booting:
          - "biosdevname"
          - "memtest86+"
        firmware:
          - "iwl100-firmware"
          - "iwl1000-firmware"
          - "iwl105-firmware"
          - "iwl135-firmware"
          - "iwl2000-firmware"
          - "iwl2030-firmware"
          - "iwl3160-firmware"
          # NOTE: Some firmware packages are only available in Buildroot
          # - "iwl3945-firmware"
          # - "iwl4965-firmware"
          - "iwl5000-firmware"
          - "iwl5150-firmware"
          # - "iwl6000-firmware"
          - "iwl6000g2a-firmware"
          - "iwl6000g2b-firmware"
          - "iwl6050-firmware"
          - "iwl7260-firmware"
          # - "libertas-sd8686-firmware"
          - "libertas-sd8787-firmware"
          # - "libertas-usb8388-firmware"
          # - "libertas-usb8388-olpc-firmware"
          - "linux-firmware"
          # - "liquidio-firmware"
          - "netronome-firmware"
          # - "opal-firmware"
    aarch64_platform: &aarch64_platform
      arch: "aarch64"
      bootloader: "grub2"
      uefi_vendor: "{{.DistroVendor}}"
      image_format: "qcow2"
      qcow2_compat: "1.1"
      packages: &aarch64_uefi_platform_packages
        uefi:
          - "dracut-config-generic"
          - "efibootmgr"
          - "grub2-efi-aa64"
          - "grub2-tools"
          - "shim-aa64"
    aarch64_installer_platform: &aarch64_installer_platform
      <<: *aarch64_platform
      packages:
        <<: *aarch64_uefi_platform_packages
        booting:
          - "grub2-efi-aa64-cdboot"
        firmware:
          - "iwl100-firmware"
          - "iwl1000-firmware"
          - "iwl105-firmware"
          - "iwl135-firmware"
          - "iwl2000-firmware"
          - "iwl2030-firmware"
          - "iwl3160-firmware"
          # NOTE: Some firmware packages are only available in Buildroot
          # - "iwl3945-firmware"
          # - "iwl4965-firmware"
          - "iwl5000-firmware"
          - "iwl5150-firmware"
          # - "iwl6000-firmware"
          - "iwl6000g2a-firmware"
          - "iwl6000g2b-firmware"
          - "iwl6050-firmware"
          - "iwl7260-firmware"
          # - "libertas-sd8686-firmware"
          - "libertas-sd8787-firmware"
          # - "libertas-usb8388-firmware"
          # - "libertas-usb8388-olpc-firmware"
          - "linux-firmware"
          # - "liquidio-firmware"
          - "netronome-firmware"
          # - "opal-firmware"
    ppc64le_bios_platform: &ppc64le_bios_platform
      arch: "ppc64le"
      bootloader: "grub2"
      bios_platform: "powerpc-ieee1275"
      image_format: "qcow2"
      qcow2_compat: "1.1"
      packages:
        bios:
          - "dracut-config-generic"
          - "powerpc-utils"
          - "grub2-ppc64le"
          - "grub2-ppc64le-modules"
      build_packages:
        bios:
          - "grub2-ppc64le"
          - "grub2-ppc64le-modules"
    s390x_zipl_platform: &s390x_zipl_platform
      arch: "s390x"
      # XXX: merge zipl_support/bootloader
      bootloader: "zipl"
      zipl_support: true
      image_format: "qcow2"
      qcow2_compat: "1.1"
      packages:
        zipl:
          - "dracut-config-generic"
          - "s390utils-base"
          - "s390utils-core"
      build_packages:
        zipl:
          - "s390utils-base"

  common_conditions:
    "add insights client on rhel": &conditions_pkgsets_insights_client_on_rhel
      when:
        distro_name: "rhel"
      append:
        include:
          - "insights-client"
    "add system-reinstall-bootc to 9.6+": &conditions_pkgsets_system_reinstall_bootc
      when:
        version_greater_or_equal: "9.6"
      append:
        include:
          - "system-reinstall-bootc"

  ec2_base_pkgset: &ec2_base_pkgset
    include:
      - "@core"
      - "authselect-compat"
      - "chrony"
      - "cloud-init"
      - "cloud-utils-growpart"
      - "dhcp-client"
      - "yum-utils"
      - "dracut-config-generic"
      - "gdisk"
      - "grub2"
      - "langpacks-en"
      - "NetworkManager-cloud-setup"
      - "redhat-release"
      - "redhat-release-eula"
      - "rsync"
      - "tuned"
      - "tar"
    exclude:
      - "aic94xx-firmware"
      - "alsa-firmware"
      - "alsa-tools-firmware"
      - "biosdevname"
      - "firewalld"
      - "iprutils"
      - "ivtv-firmware"
      - "iwl1000-firmware"
      - "iwl100-firmware"
      - "iwl105-firmware"
      - "iwl135-firmware"
      - "iwl2000-firmware"
      - "iwl2030-firmware"
      - "iwl3160-firmware"
      - "iwl3945-firmware"
      - "iwl4965-firmware"
      - "iwl5000-firmware"
      - "iwl5150-firmware"
      - "iwl6000-firmware"
      - "iwl6000g2a-firmware"
      - "iwl6000g2b-firmware"
      - "iwl6050-firmware"
      - "iwl7260-firmware"
      - "libertas-sd8686-firmware"
      - "libertas-sd8787-firmware"
      - "libertas-usb8388-firmware"
      - "plymouth"
      # RHBZ#2064087
      - "dracut-config-rescue"
      # RHBZ#2075815
      - "qemu-guest-agent"
    conditions:
      "insights client on rhel": *conditions_pkgsets_insights_client_on_rhel
      "system reinstall bootc": *conditions_pkgsets_system_reinstall_bootc

  azure_base_pkgset: &azure_base_pkgset
    include:
      - "@Server"
      - "bzip2"
      - "cloud-init"
      - "cloud-utils-growpart"
      - "efibootmgr"
      - "gdisk"
      - "hyperv-daemons"
      - "langpacks-en"
      - "lvm2"
      - "NetworkManager"
      - "NetworkManager-cloud-setup"
      - "nvme-cli"
      - "patch"
      - "rsync"
      - "selinux-policy-targeted"
      - "uuid"
      - "WALinuxAgent"
      - "yum-utils"
    exclude:
      - "aic94xx-firmware"
      - "alsa-firmware"
      - "alsa-lib"
      - "alsa-sof-firmware"
      - "alsa-tools-firmware"
      - "biosdevname"
      - "bolt"
      - "buildah"
      - "cockpit-podman"
      - "containernetworking-plugins"
      - "dnf-plugin-spacewalk"
      - "dracut-config-rescue"
      - "glibc-all-langpacks"
      - "iprutils"
      - "ivtv-firmware"
      - "iwl100-firmware"
      - "iwl1000-firmware"
      - "iwl105-firmware"
      - "iwl135-firmware"
      - "iwl2000-firmware"
      - "iwl2030-firmware"
      - "iwl3160-firmware"
      - "iwl3945-firmware"
      - "iwl4965-firmware"
      - "iwl5000-firmware"
      - "iwl5150-firmware"
      - "iwl6000-firmware"
      - "iwl6000g2a-firmware"
      - "iwl6000g2b-firmware"
      - "iwl6050-firmware"
      - "iwl7260-firmware"
      - "libertas-sd8686-firmware"
      - "libertas-sd8787-firmware"
      - "libertas-usb8388-firmware"
      - "NetworkManager-config-server"
      - "plymouth"
      - "podman"
      - "python3-dnf-plugin-spacewalk"
      - "python3-hwdata"
      - "python3-rhnlib"
      - "rhn-check"
      - "rhn-client-tools"
      - "rhn-setup"
      - "rhnlib"
      - "rhnsd"
      - "usb_modeswitch"
    conditions:
      "insights clients on rhel": *conditions_pkgsets_insights_client_on_rhel
      "system-reinstall-bootc": *conditions_pkgsets_system_reinstall_bootc
      "rhel-9.6+ drops microcode_ctl":
        when:
          version_greater_or_equal: "9.6"
        append:
          exclude:
            - "microcode_ctl"
      "x86_64 alone supports rngd":
        when:
          arch: "x86_64"
        append:
          include:
            - "rng-tools"
      "rhel-9.8+ gets azure-vm-utils and excludes initscripts-rename-device":
        when:
          version_greater_or_equal: "9.8"
        append:
          include:
            - "azure-vm-utils"
          exclude:
            - "initscripts-rename-device"

  sapapps_image_config: &sapapps_image_config
    selinux_config:
      state: "permissive"
    # RHBZ#1959979
    tmpfilesd:
      - filename: "sap.conf"
        config:
          - type: "x"
            path: "/tmp/.sap*"
          - type: "x"
            path: "/tmp/.hdb*lock"
          - type: "x"
            path: "/tmp/.trex*lock"
    # RHBZ#1959963
    pam_limits_conf:
      - filename: "99-sap.conf"
        config:
          - domain: "@sapsys"
            type: "hard"
            item: "nofile"
            value: 1048576
          - domain: "@sapsys"
            type: "soft"
            item: "nofile"
            value: 1048576
          - domain: "@dba"
            type: "hard"
            item: "nofile"
            value: 1048576
          - domain: "@dba"
            type: "soft"
            item: "nofile"
            value: 1048576
          - domain: "@sapsys"
            type: "hard"
            item: "nproc"
            value: "unlimited"
          - domain: "@sapsys"
            type: "soft"
            item: "nproc"
            value: "unlimited"
          - domain: "@dba"
            type: "hard"
            item: "nproc"
            value: "unlimited"
          - domain: "@dba"
            type: "soft"
            item: "nproc"
            value: "unlimited"
    # RHBZ#1959962
    sysctld:
      - filename: "sap.conf"
        config:
          - key: "kernel.pid_max"
            value: "4194304"
          - key: "vm.max_map_count"
            value: "2147483647"
    dnf_config:
      set_releasever_var: true

  sap_image_config: &sap_image_config
    <<: *sapapps_image_config
    tuned:
      profiles: ["sap-hana"]

  sap_base_pkgset: &sap_base_pkgset
    include:
      # RHBZ#2076763
      - "@Server"
      # RHBZ#1959813
      - "bind-utils"
      - "nfs-utils"
      - "tcsh"
      # RHBZ#1959955
      - "uuidd"
      # RHBZ#1959923
      - "cairo"
      - "expect"
      - "graphviz"
      - "gtk2"
      - "iptraf-ng"
      - "krb5-workstation"
      - "libaio"
      - "libatomic"
      - "libicu"
      - "libtool-ltdl"
      - "lm_sensors"
      - "net-tools"
      - "numactl"
      - "PackageKit-gtk3-module"
      - "xorg-x11-xauth"
      # RHBZ#1961168
      - "libnsl"
    exclude:
      - "iwl1000-firmware"
      - "iwl100-firmware"
      - "iwl105-firmware"
      - "iwl135-firmware"
      - "iwl2000-firmware"
      - "iwl2030-firmware"
      - "iwl3160-firmware"
      - "iwl5000-firmware"
      - "iwl5150-firmware"
      - "iwl6000g2a-firmware"
      - "iwl6000g2b-firmware"
      - "iwl6050-firmware"
      - "iwl7260-firmware"

  sap_extras_pkgset: &sap_extras_pkgset
    include:
      # SAP System Roles
      # https://access.redhat.com/sites/default/files/attachments/rhel_system_roles_for_sap_1.pdf
      - "ansible-core"
      - "rhel-system-roles-sap"
      # RHBZ#1960617
      - "tuned-profiles-sap-hana"

  installer_pkgset: &installer_pkgset
    include:
      - "anaconda-dracut"
      - "curl"
      - "dracut-config-generic"
      - "dracut-network"
      - "hostname"
      - "iwl100-firmware"
      - "iwl1000-firmware"
      - "iwl105-firmware"
      - "iwl135-firmware"
      - "iwl2000-firmware"
      - "iwl2030-firmware"
      - "iwl3160-firmware"
      - "iwl5000-firmware"
      - "iwl5150-firmware"
      - "iwl6050-firmware"
      - "iwl7260-firmware"
      - "kernel"
      - "less"
      - "nfs-utils"
      - "openssh-clients"
      - "ostree"
      - "plymouth"
      - "prefixdevname"
      - "rng-tools"
      - "rpcbind"
      - "selinux-policy-targeted"
      - "systemd"
      - "tar"
      - "xfsprogs"
      - "xz"
      # Extra packages that are required by the dracut stage of all installers.
      # These are weak deps of other packages in the list above, but lets be
      # explicit about what we need and not rely on the weak deps. Relying
      # on hard-dependencies for other modules is OK for now.
      #
      # add these dynamically based on the modules enabled by each
      # pipeline.
      - "mdadm"
      - "nss-softokn"
    conditions:
      "x86_64 specific installer packages":
        when:
          arch: "x86_64"
        append:
          include:
            - "biosdevname"

  wsl: &wsl_config
    config:
      boot_systemd: true
    distribution_config: &wsl_distribution_config
      shortcut:
        enabled: true
        icon: /usr/share/pixmaps/fedora-logo.ico
      oobe: &wsl_distribution_oobe_config
        default_uid: 1000

  anaconda_boot_pkgset: &anaconda_boot_pkgset
    conditions:
      "x86 specific packages for the anaconda boot pkgset":
        when:
          arch: "x86_64"
        append:
          include:
            # eficommon
            - "efibootmgr"
            # XXX: de-dup?
            # grub-common
            - "grub2-tools"
            - "grub2-tools-extra"
            - "grub2-tools-minimal"
            # arch specific
            - "grub2-efi-x64"
            - "grub2-efi-x64-cdboot"
            - "grub2-pc"
            - "grub2-pc-modules"
            - "shim-x64"
            - "syslinux"
            - "syslinux-nonlinux"
      "aarch64 specific packages for the anaconda boot pkgset":
        when:
          arch: "aarch64"
        append:
          include:
            # eficommon
            - "efibootmgr"
            # XXX: de-dup?
            # grub-common
            - "grub2-tools"
