    # note that unlike fedora rhel does not use the environment.KVM
    # for unknown reasons
    bootable: true
    default_size: "10 GiB"
    image_func: "disk"
    exports: ["qcow2"]
    required_partition_sizes: *default_required_dir_sizes
    platforms:
      - <<: *x86_64_bios_platform
        image_format: "qcow2"
      - <<: *aarch64_platform
        image_format: "qcow2"
      - <<: *ppc64le_bios_platform
        image_format: "qcow2"
      - <<: *s390x_zipl_platform
        image_format: "qcow2"
    image_config: &qcow2_image_config
      default_target: "multi-user.target"
      kernel_options:
        - "console=tty0"
        - "console=ttyS0,115200n8"
        - "net.ifnames=0"
      conditions:
        "tweak the rhsm config on rhel":
          when:
            distro_name: "rhel"
          shallow_merge:
            rhsm_config:
              "no-subscription":
                dnf_plugin:
                  product_id:
                    enabled: false
                  subscription_manager:
                    enabled: false
    partition_table:
      <<: *default_partition_tables
    package_sets:
      os:
        - include:
            - "@core"
            - "authselect-compat"
            - "chrony"
            - "cloud-init"
            - "cloud-utils-growpart"
            - "cockpit-system"
            - "cockpit-ws"
            - "dnf-utils"
            - "dosfstools"
            - "nfs-utils"
            - "oddjob"
            - "oddjob-mkhomedir"
            - "psmisc"
            - "python3-jsonschema"
            - "qemu-guest-agent"
            - "redhat-release"
            - "redhat-release-eula"
            - "rsync"
            - "tar"
            - "tuned"
            - "tcpdump"
          exclude:
            - "aic94xx-firmware"
            - "alsa-firmware"
            - "alsa-lib"
            - "alsa-tools-firmware"
            - "biosdevname"
            - "dnf-plugin-spacewalk"
            - "dracut-config-rescue"
            - "fedora-release"
            - "fedora-repos"
            - "firewalld"
            - "iprutils"
            - "ivtv-firmware"
            - "iwl1000-firmware"
            - "iwl100-firmware"
            - "iwl105-firmware"
            - "iwl135-firmware"
            - "iwl2000-firmware"
            - "iwl2030-firmware"
            - "iwl3160-firmware"
            - "iwl3945-firmware"
            - "iwl4965-firmware"
            - "iwl5000-firmware"
            - "iwl5150-firmware"
            - "iwl6000-firmware"
            - "iwl6000g2a-firmware"
            - "iwl6000g2b-firmware"
            - "iwl6050-firmware"
            - "iwl7260-firmware"
            - "langpacks-*"
            - "langpacks-en"
            - "libertas-sd8787-firmware"
            - "nss"
            - "plymouth"
            - "rng-tools"
            - "udisks2"
          conditions: &conditions_pkgsets_insigths_pkgs
            "add insights pkgs on rhel":
              when:
                distro_name: "rhel"
              append:
                include:
                  - "insights-client"
                  - "subscription-manager-cockpit"
    blueprint:
      supported_options: *supported_options_disk
